name: Feature request
description: Suggest an addition or change to the platform
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "python-analysis"
        - "web-dashboard"
        - "docs / README"
        - "CI / Docker"
