name: Bug report
description: Something in the analysis pipeline or dashboard is broken or wrong
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect, and what did you see instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "python-analysis"
        - "web-dashboard"
        - "docs / README"
        - "CI / Docker"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: request-id
    attributes:
      label: Request ID (if applicable)
      description: Found in the `X-Request-Id` response header or logs.
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "Low — cosmetic"
        - "Medium — feature impaired"
        - "High — dashboard shows wrong numbers"
        - "Critical — dashboard / CI is down"
    validations:
      required: true
