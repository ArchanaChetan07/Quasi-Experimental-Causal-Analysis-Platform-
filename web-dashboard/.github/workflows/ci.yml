name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Regenerate data bundle
        run: npm run prepare-data

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit & component tests (incl. accessibility)
        run: npm test -- --ci

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: lint-test-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Regenerate data bundle
        run: npm run prepare-data

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run e2e tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  docker:
    runs-on: ubuntu-latest
    needs: lint-test-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Regenerate data bundle
        run: npm run prepare-data

      - name: Build Docker image
        run: docker build -t causal-inference-dashboard:ci .

      - name: Smoke-test health endpoint
        run: |
          docker run -d --name dash -p 3000:3000 causal-inference-dashboard:ci
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health; then
              docker stop dash
              exit 0
            fi
            sleep 2
          done
          docker logs dash
          docker stop dash
          exit 1
